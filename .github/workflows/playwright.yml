name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # WHY: Only Chromium is installed. Installing all browsers (the default)
      # adds ~3 minutes and ~1 GB to CI time/storage that is not needed for
      # this single-browser test suite.
      - name: Install Chromium browser and OS dependencies
        run: npx playwright install --with-deps chromium

      # ── Smoke tests ───────────────────────────────────────────────────────
      - name: Run smoke tests
        run: npm run test:smoke

      # ── Functional tests ──────────────────────────────────────────────────
      - name: Run functional tests
        run: npm run test:functional

      # ── Regression tests ──────────────────────────────────────────────────
      - name: Run regression tests
        run: npm run test:regression

      # ── Upload artifacts ──────────────────────────────────────────────────
      # WHY: Always upload the report even on failure so developers can
      # inspect screenshots, videos, and traces without re-running CI.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14   # 14 days balances storage cost against debug usefulness

      - name: Upload test results (traces, screenshots, videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7    # 7 days; shorter than the HTML report since raw results are large
